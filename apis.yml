aid: pylon
url: https://raw.githubusercontent.com/api-evangelist/pylon/refs/heads/main/apis.yml
name: Pylon
kind: company
description: Pylon (usepylon.com) is a B2B customer support and customer operations
  platform that unifies shared Slack, Microsoft Teams, email, and chat support into
  a single ticketing system, with a knowledge base, accounts and contacts, AI agents,
  and a documented public REST API at https://api.usepylon.com.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Customer Support
- Customer Operations
- Ticketing
- Knowledge Base
- B2B
- Help Desk
created: '2026-06-20'
modified: '2026-06-20'
specificationVersion: '0.19'
