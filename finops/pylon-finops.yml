meters:
- name: seats
  description: Paid agent seats per plan tier, billed per seat per month (annual or monthly).
  unit: seats
  aggregation: sum
  dimensions:
  - account
  - plan
- name: ai_assistant_seats
  description: AI Assistants add-on seats billed per seat per month.
  unit: seats
  aggregation: sum
  dimensions:
  - account
- name: ai_agent_issues
  description: AI Agents add-on billed from a monthly base that scales with resolved issue volume.
  unit: issues
  aggregation: sum
  dimensions:
  - account
- name: intelligence_accounts
  description: Account Intelligence add-on billed per monitored customer account per month.
  unit: accounts
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track active vs. assigned seats per plan tier; review add-on consumption (AI Agents issue volume, Account Intelligence account count) monthly.
- name: Allocation
  description: Map seats and add-ons to teams/cost centers; tag API tokens per integration to attribute automation-driven activity.
- name: Optimization
  description: Right-size seat counts and view-only seats; choose the tier that just covers required features (API requires Professional+); reassess AI add-ons against realized deflection.
- name: Accountability
  description: Assign an owner for the Pylon subscription; review seat growth and add-on spend against budget each billing cycle.
