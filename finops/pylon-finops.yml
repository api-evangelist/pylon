description: >-
  FinOps view of Pylon spend. Pylon bills primarily as a per-seat SaaS
  subscription across Starter, Professional, and Enterprise tiers (monthly or
  annual, with seat minimums). Add-ons layer on top - AI Assistants per seat,
  AI Agents priced from a monthly base that scales with issue volume, and
  Account Intelligence per customer account. The REST API does not introduce
  separate per-call usage charges; API access is gated to the Professional
  tier and above.
notes: >-
  Per-seat rates and add-on pricing are subject to change; verify against the
  Pylon pricing page during reconciliation.
sources:
- https://www.usepylon.com/pricing
- https://docs.usepylon.com/pylon-docs/developer/api
