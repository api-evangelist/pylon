actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or SSE streaming surface exists, so no AsyncAPI document was
    created. The REST API and outbound webhook surface are catalogued in
    apis.yml across eight sub-APIs, and the OpenAPI document at
    openapi/pylon-openapi.yml models the documented REST endpoints.
