aid: pylon
name: Pylon
review:
  question: Does Pylon expose a documented public WebSocket or streaming API?
  answer: false
  date: '2026-06-20'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    Pylon's public developer surface is a request/response REST API at
    https://api.usepylon.com plus outbound webhooks. No WebSocket, SSE, or
    other streaming transport is documented, so no AsyncAPI document was
    authored. Webhooks are modeled descriptively in this review and in
    apis.yml (pylon:pylon-webhooks-api) but are an outbound HTTP callback
    mechanism, not a client-consumable streaming API.
disambiguation:
  subject: Pylon (usepylon.com)
  summary: |
    This catalog covers Pylon, the B2B customer support / customer operations
    platform at usepylon.com (REST API at api.usepylon.com). It is NOT any of
    the unrelated companies that share the "Pylon" name.
  notToBeConfusedWith:
    - name: Pylon (solar / residential energy)
      note: Solar energy / residential power companies branded "Pylon"; unrelated to customer support.
    - name: Pylon Network
      note: Energy/blockchain "Pylon Network" project; unrelated.
    - name: Basler pylon API
      note: The "pylon" camera SDK/API from Basler (docs.baslerweb.com); machine-vision camera software, unrelated.
    - name: Pylons project
      note: The Python "Pylons" / Pyramid web framework; unrelated open-source project.
    - name: getpylon.com
      note: A separate developer hub also using a "pylon" name; not the usepylon.com support platform.
findings:
  summary: |
    Pylon publishes a documented public REST API at https://api.usepylon.com,
    authenticated with a Bearer API token that only Admin users can create.
    An OpenAPI specification is published at
    https://static.usepylon.com/openapi.json and the reference lives at
    docs.usepylon.com. The API covers issues (tickets), accounts, contacts,
    users, teams, tags, custom fields, the knowledge base (knowledge bases,
    collections, articles, route redirects), and tasks/projects/milestones.
    Real-time event delivery is provided through outbound webhooks configured
    via Settings or Triggers, signed with an HS256 timestamped signature
    header. No WebSocket (ws/wss) or SSE streaming API is documented.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.usepylon.com
      documented: true
    - protocol: Webhooks
      scheme: https
      note: Outbound user-defined HTTP callbacks fired by Triggers; HS256-signed, timestamped. Not a client-consumable stream.
      documented: true
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Pylon's developer docs as of the review date.
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events streaming endpoint is documented.
